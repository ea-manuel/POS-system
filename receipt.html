<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt - POS System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Courier New", Courier, monospace;
        background: #e2e8f0;
        color: #000;
        min-height: 100vh;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .receipt-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .receipt-paper {
        background: white;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        max-width: 340px;
        width: 100%;
        padding: 25px 20px;
        position: relative;
      }

      .receipt-header {
        text-align: center;
        margin-bottom: 15px;
      }

      .receipt-header h1 {
        font-size: 22px;
        margin-bottom: 5px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .receipt-header p {
        font-size: 12px;
      }

      .divider {
        border-bottom: 1px dashed #000;
        margin: 12px 0;
      }

      .flex-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
        font-size: 12px;
      }

      .font-bold {
        font-weight: bold;
      }

      .items-table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
        font-size: 12px;
      }

      .items-table th {
        text-align: left;
        border-bottom: 1px dashed #000;
        padding-bottom: 5px;
      }

      .items-table td {
        padding: 6px 0;
        vertical-align: top;
      }

      .center {
        text-align: center;
      }

      .right {
        text-align: right;
      }

      .total-row {
        font-size: 16px;
        font-weight: bold;
        margin-top: 10px;
        border-top: 1px dashed #000;
        padding-top: 10px;
      }

      .qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
      }

      .qr-container img {
        max-width: 100px;
      }

      .qr-hint {
        font-size: 10px;
        margin-top: 8px;
      }

      /* Action Buttons */
      .action-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 30px;
        max-width: 340px;
        width: 100%;
      }

      .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: white;
      }

      .btn-print {
        background: linear-gradient(135deg, #2f2ee9 0%, #1a1ac0 100%);
      }

      .btn-download {
        background: #06b6d4;
      }

      .btn-finish {
        background: #10b981;
        flex-basis: 100%;
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      @media print {
        body {
          background: white;
          padding: 0;
        }

        .receipt-paper {
          box-shadow: none;
          max-width: 100%;
        }

        .action-buttons {
          display: none;
        }
      }

      /* Global Loader Styles */
      .global-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }
      .global-loader.show {
        opacity: 1;
        visibility: visible;
      }
      .loader-spinner {
        border: 4px solid #e8e8e8;
        border-top: 4px solid #2f2ee9;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }
      .global-loader p {
        font-size: 16px;
        font-weight: 600;
        color: #2b2b2f;
        margin: 0;
      }
    </style>
    <script>
      if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "index.html";
      }
    </script>
  </head>
  <body>
    <div class="receipt-wrapper">
      <!-- Receipt Paper (Prints and Downloads) -->
      <div class="receipt-paper" id="receipt-paper">
        <div class="receipt-header">
          <h1>RETAILHUB</h1>
          <p>Official Receipt</p>
        </div>

        <div class="flex-row">
          <span>Order #:</span>
          <span id="orderNumber" class="font-bold">ORD000000</span>
        </div>
        <div class="flex-row">
          <span>Txn ID:</span>
          <span id="transactionId">TXN000000</span>
        </div>
        <div class="flex-row">
          <span>Date:</span>
          <span id="timestamp">-</span>
        </div>
        <div class="flex-row">
          <span>Method:</span>
          <span id="paymentMethodDisplay">-</span>
        </div>

        <div class="divider"></div>

        <table class="items-table">
          <thead>
            <tr>
              <th>Item</th>
              <th class="center">Qty</th>
              <th class="right">Price</th>
              <th class="right">Amt</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody">
            <!-- Items will be populated here -->
          </tbody>
        </table>

        <div class="divider"></div>

        <div class="flex-row">
          <span>Subtotal:</span>
          <span id="subtotalDisplay">GH₵0.00</span>
        </div>
        <div class="flex-row">
          <span>Tax (10%):</span>
          <span id="taxDisplay">GH₵0.00</span>
        </div>
        <div class="flex-row total-row">
          <span>TOTAL:</span>
          <span id="totalDisplay">GH₵0.00</span>
        </div>

        <!-- Budget Info (if applicable) -->
        <div id="budgetSection" style="display: none; margin-top: 15px">
          <div class="divider"></div>
          <div class="flex-row">
            <span>Budget Set:</span>
            <span id="budgetAmount">GH₵0.00</span>
          </div>
          <div class="flex-row">
            <span>Amt Spent:</span>
            <span id="amountSpent">GH₵0.00</span>
          </div>
        </div>

        <!-- QR Code on receipt directly -->
        <div class="qr-container">
          <div id="qrcode"></div>
          <div class="qr-hint">Scan to view & save receipt</div>
          <div style="margin-top: 10px; font-size: 10px; text-align: center">
            Thank you for your business!
          </div>
        </div>
      </div>

      <!-- Action Buttons (Kept out of image/print boundary) -->
      <div class="action-buttons no-print">
        <button class="btn btn-print" onclick="printReceipt()">
          🖨️ Print Receipt
        </button>
        <button class="btn btn-download" onclick="downloadImage()">
          💾 Save as Image
        </button>
        <button class="btn btn-finish" onclick="finishTransaction()">
          ✅ New Order
        </button>
      </div>
    </div>

    <!-- Global Loader -->
    <div id="globalLoader" class="global-loader">
      <div class="loader-spinner"></div>
      <p id="loaderMessage">Loading...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const supabaseUrl = "https://czrfdcarnyesbfgnlums.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cmZkY2Fybnllc2JmZ25sdW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDY2ODAsImV4cCI6MjA4ODkyMjY4MH0.trHM_a4BJk3kpid_oi7Exz8T3U7I13mXtRwnLaG3nkY";
      const client = window.supabase.createClient(supabaseUrl, supabaseKey);

      function showLoader(msg = "Loading...") {
        const loaderMessage = document.getElementById("loaderMessage");
        if (loaderMessage) loaderMessage.textContent = msg;
        document.getElementById("globalLoader").classList.add("show");
      }

      function hideLoader() {
        document.getElementById("globalLoader").classList.remove("show");
      }

      async function initReceipt() {
        showLoader("Loading receipt...");
        try {
          const urlParams = new URLSearchParams(window.location.search);
          const saleId = urlParams.get("id");
          const method = urlParams.get("method");
          const ref = urlParams.get("ref");
          const budgetVal = urlParams.get("budget");

          if (!saleId) {
            document.body.innerHTML =
              '<div style="text-align: center; padding: 40px; color: #829298;"><p>No receipt data found</p><a href="main.html" style="color: #2f2ee9; text-decoration: none; margin-top: 20px; display: inline-block;">Return to POS</a></div>';
            hideLoader();
            return;
          }

          // Fetch from Supabase directly
          const { data: sale, error } = await client
            .from("sales")
            .select("*")
            .eq("id", saleId)
            .single();

          if (error || !sale) {
            document.body.innerHTML = `<div style="text-align: center; padding: 40px; color: #829298;"><p>Error loading receipt: ${error?.message || "Not found"}</p><a href="main.html" style="color: #2f2ee9; text-decoration: none; margin-top: 20px; display: inline-block;">Return to POS</a></div>`;
            hideLoader();
            return;
          }

          // Safely parse items (handles stringified JSON and double-stringified JSON)
          let items = [];
          try {
            items =
              typeof sale.items === "string"
                ? JSON.parse(sale.items)
                : sale.items || [];
            if (typeof items === "string") items = JSON.parse(items);
          } catch (e) {
            console.warn("Could not parse items array", e);
          }
          if (!Array.isArray(items)) items = [];

          const subtotal = items.reduce(
            (sum, item) => sum + Number(item.price) * Number(item.quantity),
            0,
          );
          const tax = subtotal * 0.1;
          const total = Number(sale.total_amount) || 0;
          const budget =
            budgetVal && !isNaN(parseFloat(budgetVal))
              ? parseFloat(budgetVal)
              : null;

          const orderNumber = "ORD" + sale.id;
          const transactionId = ref || "TXN" + sale.id;
          const timestamp = new Date(sale.created_at).toLocaleString("en-US", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: true,
          });

          // Display receipt info
          document.getElementById("orderNumber").textContent = orderNumber;
          document.getElementById("transactionId").textContent = transactionId;
          document.getElementById("timestamp").textContent = timestamp;

          // Display payment method
          let paymentMethodText = "";
          if (method === "paystack") {
            paymentMethodText = "Paystack (Card / Mobile Money)";
          } else {
            paymentMethodText = "Cash";
          }
          document.getElementById("paymentMethodDisplay").textContent =
            paymentMethodText;

          // Display items
          const itemsHTML = items
            .map((item) => {
              const price = Number(item.price) || 0;
              const qty = Number(item.quantity) || 1;
              return `
                <tr>
                    <td>
                        <div>${item.name || "Item"}</div>
                        <div style="font-size: 10px; color: #555;">${item.barcode || ""}</div>
                    </td>
                    <td class="center">${qty}</td>
                    <td class="right">${price.toFixed(2)}</td>
                    <td class="right">${(price * qty).toFixed(2)}</td>
                </tr>
              `;
            })
            .join("");

          document.getElementById("itemsTableBody").innerHTML = itemsHTML;

          // Display totals
          document.getElementById("subtotalDisplay").textContent =
            "GH₵" + subtotal.toFixed(2);
          document.getElementById("taxDisplay").textContent =
            "GH₵" + tax.toFixed(2);
          document.getElementById("totalDisplay").textContent =
            "GH₵" + total.toFixed(2);

          // Display budget info if applicable
          if (budget) {
            document.getElementById("budgetSection").style.display = "block";
            document.getElementById("budgetAmount").textContent =
              "GH₵" + budget.toFixed(2);
            document.getElementById("amountSpent").textContent =
              "GH₵" + total.toFixed(2);
          }

          // Build a concise version of the receipt for the QR Code to prevent data overflow
          let qrText = "RETAILHUB\n";
          qrText += `Order: ${orderNumber}\n`;
          qrText += `Date: ${timestamp}\n`;
          qrText += "----------------\n";

          const qrItems = items.slice(0, 3);
          qrItems.forEach((item) => {
            qrText += `${item.quantity}x ${item.name}\n`;
          });
          if (items.length > 3)
            qrText += `...and ${items.length - 3} more items\n`;

          qrText += "----------------\n";
          qrText += `TOTAL: GH₵${total.toFixed(2)}\n`;

          // Generate QR code encoding the text data directly
          const qrcodeContainer = document.getElementById("qrcode");
          qrcodeContainer.innerHTML = ""; // clear previous
          if (typeof QRCode !== "undefined") {
            new QRCode(qrcodeContainer, {
              text: qrText,
              width: 128,
              height: 128,
              colorDark: "#000000",
              colorLight: "#ffffff",
              correctLevel: QRCode.CorrectLevel.L,
            });
          }
          hideLoader();
        } catch (err) {
          console.error("Receipt generation error:", err);
          document.body.innerHTML = `<div style="text-align: center; padding: 40px; color: #829298;"><p>An error occurred generating the receipt: ${err.message}</p><button onclick="window.location.href='main.html'" style="padding: 10px 20px; background: #2f2ee9; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px;">Return to POS</button></div>`;
          hideLoader();
        }
      }

      function downloadImage() {
        const receiptElement = document.getElementById("receipt-paper");
        const orderNumber =
          document.getElementById("orderNumber").textContent || "Receipt";

        // Render the HTML into a canvas, then save as image
        html2canvas(receiptElement, {
          scale: 2, // Higher quality image
          backgroundColor: "#ffffff",
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = `RetailHub_${orderNumber}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }

      function printReceipt() {
        window.print();
      }

      function finishTransaction() {
        // Return to main POS
        window.location.href = "main.html";
      }

      // Initialize on page load
      document.addEventListener("DOMContentLoaded", initReceipt);
    </script>
  </body>
</html>
